influxdb:
  api_version: 1
  host: 192.168.0.123 # js3
  database: homeassistant
  username: homeassistant
  password: !secret influxdb_password
  tags_attributes:
    - friendly_name
  include:
    domains:
      - sensor
      - input_number
      - media_player
      - select

utility_meter:
  daily_energy:
    source: sensor.energy_usage
    name: Daily Energy Meter
    # cycle: daily
    # Hack: cycle 1 min before midnight to 
    # keep the timestamp on the current day
    cron: "59 23 * * *"
    tariffs:
      - peak
      - offpeak
  monthly_energy:
    source: sensor.energy_usage
    name: Monthly Energy Meter
    cycle: monthly
    offset:
      days: 5
    tariffs:
      - peak
      - offpeak
