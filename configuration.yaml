      {% endif %}

- binary_sensor:
  - name: is_peak_time
    default_entity_id: binary_sensor.is_peak_time
    state: >
      {# all days set below to test on a sunday #}
      {% if now().weekday() in (0,1,2,3,4) and now().hour >= 16 and now().hour < 19 %}
        on
      {% else %}
        off
      {% endif %}
- light:
  - name: family_room_log_light
    default_entity_id: light.family_room_log_light
    turn_on: []
    turn_off: []
    set_level: []
  - name: breakfast_area_log_light
    default_entity_id: light.breakfast_area_log_light
    turn_on: []
    turn_off: []
    set_level: []
  - name: kitchen_log_light
    default_entity_id: light.kitchen_log_light
    turn_on: []
    turn_off: []
    set_level: []

