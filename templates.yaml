- binary_sensor:
  - name: is_peak_time
    default_entity_id: binary_sensor.is_peak_time
    state: >
      {# all days set below to test on a sunday #}
      {% if now().weekday() in (0,1,2,3,4) and now().hour >= 16 and now().hour < 19 %}
        on
      {% else %}
        off
      {% endif %}
- light:
  - unique_id: family_room_log_light
    name: Family Room Log Light
    # No state/level templates needed since it's purely virtual/optimistic
    # AppDaemon handles all logic via listeners
    optimistic: true  # HA assumes state/brightness internally (your empty actions already imply this)
    turn_on:
      []  # empty → no real action
    turn_off:
      []
    set_level:
      []  # or omit if not using set_level
  - unique_id: breakfast_area_log_light
    name: Breakfast Area Log Light
    optimistic: true
    turn_on: []
    turn_off: []
    set_level: []
  - unique_id: kitchen_log_light
    name: Kitchen Log Light
    optimistic: true
    turn_on: []
    turn_off: []
    set_level: []
- number:
  - name: Family room TV volume
    state: "{{ (states('input_number.family_room_tv_volume') | float) | round(2) }}"
    set_value: []
