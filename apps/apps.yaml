volume_controller:
  module: volume_controller
  class: VolumeController
  knob: input_number.family_room_tv_volume_knob
  tv_media_player: media_player.family_room_tv
  up_trigger: input_boolean.family_room_tv_volume_up
  down_trigger: input_boolean.family_room_tv_volume_down
  source_map:
    media_player.xantech_dax88_front:  
      source: Front
      scale:  0.8
    media_player.xantech_dax88_center: 
      source: Center
      scale: 1.0
    media_player.xantech_dax88_rear:   
      source: Rear
      scale:  0.8  
  volume_limit: 0.75

energy_controller:
  module: energy_controller
  class: EnergyController

family_room_log_light:
  module: log_light
  class: LogLight
  log_light_entity: light.family_room_log_light
  real_light_entity: light.family_room

breakfast_area_log_light:
  module: log_light
  class: LogLight
  log_light_entity: light.breakfast_area_log_light
  real_light_entity: light.breakfast_area

kitchen_log_light:
  module: log_light
  class: LogLight
  log_light_entity: light.kitchen_log_light
  real_light_entity: light.kitchen

cooling_logger:
  module: cooling_logger
  class: CoolingLogger

doorbell_entity_listener:
  module: entity_listener
  class: EntityListener
  substr: "front_door"

doorbell:
  module: doorbell
  class: Doorbell
  doorbell: binary_sensor.front_door_button_pressed
  chime: media-source://media_source/local/trimmed_doorbell.wav
  speakers: 
    - media_player.big_sonos
    - media_player.little_sonos

